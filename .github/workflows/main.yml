name: Compilar Executable Windows

on:
  push:
    branches: [ main ]  # Se activa cuando subes el código

jobs:
  build:
    runs-on: windows-latest  # ¡Aquí ocurre la magia de Windows!

    steps:
    - name: Descargar código
      uses: actions/checkout@v4

    - name: Configurar Python
      uses: actions/setup-python@v5
      with:
        python-version: '3.11'

    - name: Instalar dependencias
      run: |
        python -m pip install --upgrade pip
        pip install -r requirements.txt

    - name: Crear EXE
      run: |
        pyinstaller --onefile --noconfirm main.py

    - name: Subir resultado
      uses: actions/upload-artifact@v4
      with:
        name: Procesador-Excel-Windows
        path: dist/main.exe
